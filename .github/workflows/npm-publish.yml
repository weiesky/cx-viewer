name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  verify:
    if: github.repository == 'weiesky/cx-viewer'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          package-manager-cache: false

      # This repository does not currently commit a package-lock.json, so npm ci
      # cannot be used. Keep the runner install ephemeral and do not create a lock.
      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Test supported Node.js runtime
        run: npm test

  publish:
    if: github.repository == 'weiesky/cx-viewer'
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6

      - name: Set up Node.js and npm registry
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Verify release tag matches package version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          package_version="$(node -p "require('./package.json').version")"
          release_tag="$RELEASE_TAG"
          tag_version="${release_tag#v}"

          if [[ "$tag_version" != "$package_version" ]]; then
            echo "Release tag '$release_tag' does not match package.json version '$package_version'."
            exit 1
          fi

      - name: Check whether package version is already published
        id: npm-version
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          if npm view "$package_name@$package_version" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "$package_name@$package_version is already published; skipping duplicate publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      # This repository does not currently commit a package-lock.json, so npm ci
      # cannot be used. Keep the runner install ephemeral and do not create a lock.
      - name: Install dependencies
        if: steps.npm-version.outputs.published != 'true'
        run: npm install --no-package-lock

      - name: Test, build, and inspect package contents
        if: steps.npm-version.outputs.published != 'true'
        run: npm run release:check

      # Authentication comes from npm Trusted Publishing via GitHub OIDC.
      # Provenance is generated automatically for trusted publishes.
      - name: Publish package
        if: steps.npm-version.outputs.published != 'true'
        run: npm publish --access public
