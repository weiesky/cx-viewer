<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 12px;
    height: 50px;
    display: flex;
    align-items: center;
    overflow: hidden;
    user-select: none;
    -webkit-app-region: drag;
    background: var(--bg);
    color: var(--text);
    border-bottom: 1px solid var(--border);
  }
  /* Theme variables */
  :root {
    --bg: #1a1a1a;
    --bg-tab: #111;
    --bg-tab-active: #2a2a2a;
    --bg-tab-hover: #2a2a2a;
    --text: #aaa;
    --text-active: #e5e5e5;
    --border: #333;
    --accent: #1668dc;
    --close-hover: rgba(255,255,255,0.1);
    /* tab 状态点 / 待审批小圆环：默认用 accent（与按钮边框同色），背景+边框统一此色，色彩更均衡；
     * has-pending 非活动 tab 时仍由 keyframes 在 accent ↔ text 间脉动提示。 */
    --pending-ring: var(--accent);
  }
  [data-theme="light"] {
    --bg: #f0f0f0;
    --bg-tab: #e8e8e8;
    --bg-tab-active: #ffffff;
    --bg-tab-hover: #ffffff;
    --text: #666;
    --text-active: #1a1a1a;
    --border: #ddd;
    --accent: #0969DA;
    --close-hover: rgba(0,0,0,0.08);
    --pending-ring: var(--accent);
  }
  /* macOS traffic lights padding + drag area */
  .traffic-light-spacer {
    width: 70px;
    flex-shrink: 0;
    -webkit-app-region: drag;
    transition: width 0.15s;
  }
  /* Fullscreen 时 macOS 红黄绿按钮隐藏，占位也去掉 */
  body.fullscreen .traffic-light-spacer {
    width: 0;
  }
  /* Windows：无 traffic lights，70px 幽灵占位去掉 */
  body.win32 .traffic-light-spacer { display: none; }
  /* Windows 品牌区(logo + 标题)：处于拖拽区，仅 win32 显示 */
  #winBrand {
    display: none;
    align-items: center;
    gap: 7px;
    padding: 0 6px 0 12px;
    flex-shrink: 0;
    color: var(--text-active);
    font-size: 12px;
    font-weight: 600;
    -webkit-app-region: drag;
  }
  body.win32 #winBrand { display: flex; }
  #winBrand svg { display: block; color: var(--accent); }
  /* Windows HTML 菜单栏(File/Edit/View/Window)：文案与下拉皮肤跟随主题,下拉由活动 tab 的 React 渲染 */
  #menuBar {
    display: none;
    align-items: center;
    flex-shrink: 0;
    margin-right: 4px;
    -webkit-app-region: no-drag;
  }
  body.win32 #menuBar { display: flex; }
  .menubar-btn {
    height: 26px;
    padding: 0 9px;
    border-radius: 6px;
    border: none;
    background: none;
    color: var(--text);
    cursor: pointer;
    font-size: 12px;
    white-space: nowrap;
    -webkit-app-region: no-drag;
    transition: background 0.1s, color 0.1s;
  }
  .menubar-btn:hover { background: var(--close-hover); color: var(--text-active); }
  .menubar-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  /* Windows 原生窗控(最小化/最大化/关闭)overlay 区域占位:titleBarOverlay 的三按钮绘制在本视图
     右上角之上,DOM 摸不到也测不了宽度(env(titlebar-area-*) 在子 WebContentsView 不可靠),
     按 Win11 标准 3×46px≈138px 取 140px 固定值;若 Windows 改版导致重叠/留白,在此调整。
     全屏时 overlay 按钮消失,占位收起。 */
  .win-overlay-spacer {
    display: none;
    flex-shrink: 0;
    width: 140px;
    align-self: stretch;
    -webkit-app-region: drag;
  }
  body.win32 .win-overlay-spacer { display: block; }
  body.win32.fullscreen .win-overlay-spacer { width: 0; }
  /* Right-side drag area */
  .drag-spacer {
    flex-shrink: 0;
    width: 60px;
    -webkit-app-region: drag;
  }
  .tab-container {
    display: flex;
    overflow-x: auto;
    overflow-y: hidden;
    height: 100%;
    align-items: center;
    gap: 4px;
    padding: 8px 0 8px 8px;
    -webkit-app-region: no-drag;
  }
  /* Empty space after tabs + "+" button becomes drag area */
  .tab-drag-fill {
    flex: 1;
    min-width: 20px;
    -webkit-app-region: drag;
  }
  .tab-container::-webkit-scrollbar { height: 0; }
  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 12px;
    height: 34px;
    max-width: 180px;
    min-width: 60px;
    cursor: pointer;
    white-space: nowrap;
    border-radius: 12px;
    background: var(--bg-tab);
    color: var(--text);
    position: relative;
    transition: background 0.1s, box-shadow 0.1s;
  }
  .tab:hover { background: var(--bg-tab-hover); }
  .tab.active {
    background: var(--bg-tab-active);
    color: var(--text-active);
    box-shadow: inset 0 0 0 2px var(--accent);
  }
  .tab.loading { opacity: 0.6; }
  .tab-name {
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  /* 左侧 16px 状态槽，与右侧 .tab-close 镜像。永远占位，避免 tab 名因状态变化抖动。
   * 槽内 8px 圆点默认填 var(--pending-ring)(= accent)，常驻作为每个 tab 的状态点；
   * .has-pending:not(.active) 时由 keyframes 让 border-color 在 accent ↔ var(--text) 间脉动以强调待审批。 */
  .tab-pending {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .tab-pending::before {
    content: '';
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: 1.5px solid var(--pending-ring);
    background: var(--pending-ring);
    box-sizing: border-box;
  }
  .tab.has-pending:not(.active) .tab-pending::before {
    animation: tab-pending-pulse 1.4s ease-in-out infinite;
  }
  @keyframes tab-pending-pulse {
    0%, 100% { border-color: var(--pending-ring); }
    50% { border-color: var(--text); }
  }
  .tab-close {
    width: 16px;
    height: 16px;
    border-radius: 3px;
    border: none;
    background: none;
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.1s, background 0.1s;
    flex-shrink: 0;
  }
  /* 关闭按钮只在选中的 tab 上显示，未选中的 tab hover 也不显示 */
  .tab.active .tab-close { opacity: 1; }
  .tab-close:hover { background: var(--close-hover); }
  .new-tab-btn {
    width: 28px;
    height: 28px;
    border-radius: 4px;
    border: none;
    background: none;
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin: auto 6px;
    align-self: center;
    -webkit-app-region: no-drag;
    transition: background 0.1s;
  }
  .new-tab-btn:hover { background: var(--close-hover); color: var(--text-active); }
  /* iPad 模式开关：窗口级，常驻 tab bar 右侧 */
  .mode-btn {
    width: 30px;
    height: 30px;
    border-radius: 6px;
    border: none;
    background: none;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin: auto 10px auto 4px;
    -webkit-app-region: no-drag;
    transition: background 0.1s, color 0.1s;
  }
  .mode-btn:hover { background: var(--close-hover); color: var(--text-active); }
  .mode-btn svg { display: block; }
  /* 从 React header 迁移过来的控件簇（左：菜单+代理；右：bell/主题/终端/视图） */
  .hdr-cluster {
    display: flex; align-items: center; gap: 4px;
    flex-shrink: 0; -webkit-app-region: no-drag;
  }
  #leftCluster { margin: 0 4px 0 10px; }
  #rightCluster { margin: 0 2px; }
  .hdr-btn {
    height: 28px; min-width: 28px; padding: 0 7px;
    border-radius: 6px; border: none; background: none;
    color: var(--text); cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 5px;
    font-size: 12px; white-space: nowrap;
    -webkit-app-region: no-drag;
    transition: background 0.1s, color 0.1s;
  }
  .hdr-btn:hover { background: var(--close-hover); color: var(--text-active); }
  .hdr-btn.active { background: var(--bg-tab-active); color: var(--text-active); box-shadow: inset 0 0 0 1px var(--accent); }
  .hdr-btn svg { display: block; }
  .hdr-btn .badge {
    min-width: 15px; height: 15px; padding: 0 4px; border-radius: 8px;
    background: var(--accent); color: #fff; font-size: 10px; line-height: 15px; text-align: center;
  }
  .hdr-btn.proxy-btn { color: var(--accent); }
  .hdr-countdown { font-size: 11px; color: var(--text); white-space: nowrap; padding: 0 4px; align-self: center; -webkit-app-region: no-drag; }
  /* 键盘可达性：tab bar 内按钮聚焦时给出可见描边（窗口级 chrome 默认无聚焦样式）。 */
  .hdr-btn:focus-visible, .mode-btn:focus-visible, .new-tab-btn:focus-visible, .tab-close:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 1px;
  }
  /* 全屏下无法 resize → iPad 开关无意义：禁用并弱化，避免「点了没反应」。 */
  body.fullscreen .mode-btn { opacity: 0.4; pointer-events: none; }
  /* iPad/移动模式：顶部工具栏只保留当前项目 tab + 模式开关，其余隐藏。
     镜像 body.fullscreen 的做法，纯 CSS，不动 render()。 */
  body.device-mode #leftCluster,
  body.device-mode #rightCluster,
  body.device-mode .tab:not(.active),
  body.device-mode .new-tab-btn,
  body.device-mode #winBrand,
  body.device-mode #menuBar {
    display: none;
  }
</style>
</head>
<body>
  <div class="traffic-light-spacer"></div>
  <div id="winBrand" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="5.5"/><circle cx="12" cy="12" r="1.8" fill="currentColor"/><line x1="12" y1="2" x2="12" y2="4.2"/><line x1="12" y1="19.8" x2="12" y2="22"/><line x1="2" y1="12" x2="4.2" y2="12"/><line x1="19.8" y1="12" x2="22" y2="12"/><line x1="4.9" y1="4.9" x2="6.5" y2="6.5"/><line x1="17.5" y1="17.5" x2="19.1" y2="19.1"/><line x1="4.9" y1="19.1" x2="6.5" y2="17.5"/><line x1="17.5" y1="6.5" x2="19.1" y2="4.9"/></svg><span>CX Viewer</span></div>
  <div id="menuBar" role="menubar"></div>
  <div class="hdr-cluster" id="leftCluster"></div>
  <div class="tab-container" id="tabs"><!-- tabs + newBtn rendered here --></div>
  <div class="tab-drag-fill"></div>
  <div class="hdr-cluster" id="rightCluster"></div>
  <button class="mode-btn" id="modeBtn" title="Switch to iPad mode" aria-pressed="false"></button>
  <div class="win-overlay-spacer" aria-hidden="true"></div>

<script>
  let tabs = [];
  let activeTabId = null;

  const tabsEl = document.getElementById('tabs');
  const newBtn = document.getElementById('newBtn');

  // 平台 class:win32 时隐藏 traffic-light 占位、显示品牌区/HTML 菜单栏/原生窗控 overlay 占位(纯 CSS 接管)。
  const PLATFORM = (window.tabAPI.platform || '');
  if (PLATFORM) document.body.classList.add(PLATFORM);

  // 主进程推来的已翻译菜单模型 + tab bar 文案(语言切换时会重推)。
  let menuModel = null;
  let uiStrings = {};

  function render() {
    // tab.name / tab.id 来自 main 进程，最终源头是用户输入的项目名 / 路径，可控字符串。
    // 用 textContent + setAttribute 替代 innerHTML 模板拼接，避免 `</span><img onerror=...>`
    // 之类的项目名逃逸属性 / 注入新元素。close 按钮的 ×（HTML 实体 &times;）改用 × 字面量。
    tabsEl.replaceChildren();
    tabs.forEach(tab => {
      const el = document.createElement('div');
      el.className = 'tab'
        + (tab.id === activeTabId ? ' active' : '')
        + (tab.status === 'loading' ? ' loading' : '')
        + (tab.pending > 0 ? ' has-pending' : '');

      // 左侧状态槽：始终占 16px，避免有/无待审批时 tab 名抖动；
      // .has-pending:not(.active) 时由 CSS 把里面的圆环点亮 + 脉动。
      const pendingEl = document.createElement('span');
      pendingEl.className = 'tab-pending';
      pendingEl.setAttribute('aria-hidden', 'true');
      el.appendChild(pendingEl);

      const nameEl = document.createElement('span');
      nameEl.className = 'tab-name';
      nameEl.setAttribute('title', tab.name);
      nameEl.textContent = (tab.status === 'loading' ? '⏳ ' : '') + tab.name;
      el.appendChild(nameEl);

      const closeBtn = document.createElement('button');
      closeBtn.className = 'tab-close';
      closeBtn.dataset.id = tab.id;
      closeBtn.textContent = '×';
      el.appendChild(closeBtn);

      el.addEventListener('click', (e) => {
        if (e.target.classList.contains('tab-close')) return;
        window.tabAPI.switchTab(tab.id);
      });
      closeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        window.tabAPI.closeTab(tab.id);
      });
      tabsEl.appendChild(el);
    });
    // "+" 仅在已有 tab 时显示：零 tab（初始化界面）本身就是项目选择器，再放「+」属交互重叠。
    if (tabs.length > 0) {
      const btn = document.createElement('button');
      btn.className = 'new-tab-btn';
      btn.title = uiStrings.newTab || 'New project tab';
      btn.textContent = '+';
      btn.addEventListener('click', () => window.tabAPI.newTab());
      tabsEl.appendChild(btn);
    }
  }

  window.tabAPI.onTabsUpdated((newTabs) => {
    tabs = newTabs;
    render();
  });

  window.tabAPI.onTabActivated((tabId) => {
    activeTabId = tabId;
    render();
  });

  window.tabAPI.onThemeChanged((theme) => {
    document.documentElement.setAttribute('data-theme', theme);
  });

  window.tabAPI.onFullscreenChanged?.((isFullscreen) => {
    document.body.classList.toggle('fullscreen', !!isFullscreen);
  });

  // iPad 模式开关（窗口级）：点击切换 PC ⇄ iPad，图标显示当前模式（显示器 / 手机样式）。
  const modeBtn = document.getElementById('modeBtn');
  const ICON_MONITOR = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>';
  const ICON_PHONE = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="2" width="12" height="20" rx="2.5"/><path d="M11 18h2"/></svg>';
  let deviceOn = false;
  // iPad/PC 开关 tooltip:优先用活动 tab header 模型下发的(React t());无模型时用主进程
  // menu-model 附带的 uiStrings(server i18n);两者都没到时英文兜底。
  let modeTitles = { toIpad: 'Switch to iPad mode', toPc: 'Switch to PC mode' };
  let modeTitlesFromModel = false;
  function renderModeBtn() {
    modeBtn.innerHTML = deviceOn ? ICON_PHONE : ICON_MONITOR;
    modeBtn.setAttribute('aria-pressed', String(deviceOn));
    modeBtn.title = deviceOn ? modeTitles.toPc : modeTitles.toIpad;
    modeBtn.setAttribute('aria-label', modeBtn.title);
  }
  modeBtn.addEventListener('click', () => window.tabAPI.toggleDeviceMode());
  window.tabAPI.onDeviceModeChange?.((on) => {
    deviceOn = !!on;
    renderModeBtn();
    document.body.classList.toggle('device-mode', deviceOn);
  });
  renderModeBtn();
  window.tabAPI.requestDeviceMode?.();

  // ---- 从 React header 迁移过来的控件（active tab 推模型，这里渲染；点击回传 main → active tab）----
  const leftCluster = document.getElementById('leftCluster');
  const rightCluster = document.getElementById('rightCluster');
  let headerModel = null;
  let headerModelTabId = null; // 模型所属 tab；随点击回传，main 据此精确投递，规避切 tab 竞态
  const HSVG = {
    menu: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>',
    proxy: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>',
    bell: '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a6 6 0 0 0-6 6v3.5L4.5 14a1 1 0 0 0 .8 1.6h13.4a1 1 0 0 0 .8-1.6L18 11.5V8a6 6 0 0 0-6-6z"/><path d="M10 18a2 2 0 0 0 4 0"/></svg>',
    sun: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.2" y1="4.2" x2="5.6" y2="5.6"/><line x1="18.4" y1="18.4" x2="19.8" y2="19.8"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.2" y1="19.8" x2="5.6" y2="18.4"/><line x1="18.4" y1="5.6" x2="19.8" y2="4.2"/></svg>',
    moon: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>',
    terminal: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>',
    chat: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.6-.8L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8A8.5 8.5 0 0 1 12.5 3 8.38 8.38 0 0 1 21 11.5z"/></svg>',
    raw: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
    qr: '<svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M0 0h10v10H0zM2 2v6h6V2zM3 3h4v4H3zM14 0h10v10H14zM16 2v6h6V2zM17 3h4v4H17zM0 14h10v10H0zM2 16v6h6v-6zM3 17h4v4H3zM14 14h3v3h-3zM20 14h3v3h-3zM17 17h3v3h-3zM14 20h3v3h-3zM20 20h3v3h-3z"/></svg>',

  function hEsc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function hBtn(html, title, type, opts){
    const b = document.createElement('button');
    b.className = 'hdr-btn' + (opts&&opts.cls ? (' '+opts.cls) : '') + (opts&&opts.active ? ' active' : '');
    if (title) { b.title = title; b.setAttribute('aria-label', title); } // icon-only 按钮：title 对 AT 不可达，补 aria-label
    if (opts && opts.active) b.setAttribute('aria-pressed', 'true');
    if (opts && opts.color) b.style.color = opts.color;
    b.innerHTML = html;
    const svgEl = b.querySelector('svg');
    if (svgEl && !svgEl.hasAttribute('aria-hidden')) svgEl.setAttribute('aria-hidden', 'true'); // 装饰性图标对 AT 隐藏
    const payload = Object.assign({ tabId: headerModelTabId }, opts && opts.payload, { type });
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      // 需锚定坐标的按钮(如二维码弹层):点击时附带「按钮右缘到窗口右缘的距离」,React 端据此把弹层
      // 锚到图标正下方(同 menuBarOpen 传 x 的机制)。tab bar 视图未被原生缩放、React 内容视图按
      // cxv_displayScale 缩放,故 React 端会再除以缩放系数。
      if (opts && opts.withRect) {
        const r = b.getBoundingClientRect();
        window.tabAPI.headerAction(Object.assign({}, payload, { rightOffset: Math.round(window.innerWidth - r.right) }));
      } else {
        window.tabAPI.headerAction(payload);
      }
    });
    return b;
  }
  function renderClusters(){
    leftCluster.replaceChildren();
    rightCluster.replaceChildren();
    const m = headerModel;
    if (!m) return; // 无活动 tab（工作区选择器）→ 不显示任何迁移控件
    // 左侧：菜单（在 React 内打开下拉，避免被 50px 高的 tab bar 裁切）+ 代理 + IM 状态
    leftCluster.appendChild(hBtn(HSVG.menu, (m.menu && m.menu.title) || uiStrings.menu || 'Menu', 'menuOpen'));
    if (m.proxy && m.proxy.label) {
      leftCluster.appendChild(hBtn(HSVG.proxy + '<span>' + hEsc(m.proxy.label) + '</span>', m.proxy.label, 'proxy', { cls: 'proxy-btn' }));
    }
    if (Array.isArray(m.im)) {
      m.im.forEach((chip) => {
        if (!chip || !chip.id) return; // 容错：非法 model 条目不应中断整簇渲染
        const def = IM_ICON[chip.id];
        if (!def) return;
        const svg = '<svg width="16" height="16" viewBox="' + def.vb + '" fill="currentColor" aria-hidden="true"><path d="' + def.path + '"/></svg>';
        leftCluster.appendChild(hBtn(svg, chip.name || chip.id, 'im', { payload: { id: chip.id }, color: chip.connected ? def.color : 'var(--text)' }));
      });
    }
    // 钉住的快捷方式：汉堡右侧常驻入口。点击回传 menuShortcut + key → React _handleHeaderAction 触发对应动作。
    if (Array.isArray(m.pins)) {
      m.pins.forEach((p) => {
        if (!p || !p.key) return; // 容错：非法条目不中断整簇渲染
        const path = MENU_ICON[p.key];
        if (!path) return;
        const svg = '<svg width="16" height="16" viewBox="' + MENU_ICON_VB + '" fill="currentColor" aria-hidden="true"><path d="' + path + '"/></svg>';
        leftCluster.appendChild(hBtn(svg, p.name || p.key, 'menuShortcut', { payload: { key: p.key } }));
      });
    }
    // 右侧：审批 bell、倒计时、二维码、主题、终端、视图模式
    if (m.approval && m.approval.count > 0) {
      rightCluster.appendChild(hBtn(HSVG.bell + '<span class="badge">' + hEsc(m.approval.count) + '</span>', m.approval.title || '', 'approval'));
    }
    if (m.countdown && m.countdown.text) {
      const c = document.createElement('span');
      c.className = 'hdr-countdown';
      c.textContent = m.countdown.text;
      rightCluster.appendChild(c);
    }
    if (m.qr) {
      rightCluster.appendChild(hBtn(HSVG.qr, (m.qr && m.qr.title) || 'QR', 'qrOpen', { withRect: true }));
    }
    if (m.theme) {
      rightCluster.appendChild(hBtn(m.theme.mode === 'light' ? HSVG.sun : HSVG.moon, m.theme.title || '', 'theme'));
    }
    if (m.terminal) {
      rightCluster.appendChild(hBtn(HSVG.terminal, m.terminal.label || '', 'terminal', { active: !!m.terminal.active }));
    }
    if (m.viewMode) {
      rightCluster.appendChild(hBtn(m.viewMode.mode === 'raw' ? HSVG.chat : HSVG.raw, m.viewMode.label || '', 'viewMode'));
    }
  }
  window.tabAPI.onHeaderModel?.((model, tabId) => {
    headerModel = model;
    if (tabId != null) headerModelTabId = tabId;
    if (model && model.deviceMode) { modeTitles = model.deviceMode; modeTitlesFromModel = true; renderModeBtn(); } // 习得本地化的开关 tooltip
    renderClusters();
    renderMenuBar(); // 菜单栏仅在有活动 tab 时渲染(下拉宿主在活动 tab 的 React 里)
  });
  window.tabAPI.requestHeaderModel?.(); // 首帧拉取活动 tab 已缓存模型，规避 did-finish-load 竞态后空白

  // ---- Windows HTML 菜单栏(File/Edit/View/Window) ----
  // 点击把 menuId + 按钮横坐标经 header-action 发给 main(main 附上已翻译模型)→ 活动 tab 的
  // React 在内容视图里渲染跟随皮肤的下拉(50px 高的 tab bar 自己放不下下拉)。
  const menuBarEl = document.getElementById('menuBar');
  // React 端回报的「菜单下拉是否打开」状态:打开时 hover 相邻顶级菜单即切换(原生菜单栏惯例)。
  let menuDropdownOpen = false;
  function renderMenuBar() {
    menuBarEl.replaceChildren();
    if (PLATFORM !== 'win32' || !Array.isArray(menuModel) || !headerModel) return;
    menuModel.forEach((menu) => {
      const b = document.createElement('button');
      b.className = 'menubar-btn';
      b.setAttribute('role', 'menuitem');
      b.setAttribute('aria-haspopup', 'true');
      b.textContent = menu.label;
      const open = () => {
        window.tabAPI.headerAction({
          tabId: headerModelTabId,
          type: 'menuBarOpen',
          menuId: menu.id,
          x: Math.round(b.getBoundingClientRect().left),
        });
      };
      b.addEventListener('click', (e) => { e.stopPropagation(); open(); });
      b.addEventListener('mouseenter', () => { if (menuDropdownOpen) open(); });
      menuBarEl.appendChild(b);
    });
  }
  window.tabAPI.onMenuModel?.((payload) => {
    menuModel = (payload && payload.menus) || null;
    uiStrings = (payload && payload.uiStrings) || {};
    if (!modeTitlesFromModel && uiStrings.toIpad && uiStrings.toPc) {
      modeTitles = { toIpad: uiStrings.toIpad, toPc: uiStrings.toPc };
      renderModeBtn();
    }
    render();        // "+" tooltip 应用翻译
    renderClusters(); // 汉堡兜底 tooltip 应用翻译
    renderMenuBar();
  });
  window.tabAPI.onMenuBarState?.((open) => { menuDropdownOpen = !!open; });
</script>
</body>
</html>
